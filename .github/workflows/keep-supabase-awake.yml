name: Keep Supabase Awake

on:
  schedule:
    # Runs every Monday and Thursday at 09:23 UTC.
    # This keeps Supabase active and also creates regular GitHub repo activity.
    - cron: '23 9 * * 1,4'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  ping-and-timestamp:
    name: Ping Supabase and update timestamp
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Ping Supabase
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_PING_URL: https://jzhypwgkhcpgclwiarnk.supabase.co/rest/v1/ping?select=id&limit=1
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "::error::Missing GitHub secret: SUPABASE_ANON_KEY"
            exit 1
          fi

          echo "Pinging Supabase:"
          echo "$SUPABASE_PING_URL"

          curl --fail-with-body --show-error --silent \
            --retry 3 \
            --retry-all-errors \
            --retry-delay 10 \
            --max-time 20 \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_PING_URL"

      - name: Update timestamp file and commit
        run: |
          set -euo pipefail

          mkdir -p .github/keepalive

          date -u +"Last successful Supabase ping: %Y-%m-%dT%H:%M:%SZ" > .github/keepalive/last-successful-ping.txt

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .github/keepalive/last-successful-ping.txt

          if git diff --cached --quiet; then
            echo "No timestamp change to commit."
            exit 0
          fi

          git commit -m "chore: record Supabase keepalive ping"
          git push
